# Reverse proxy Nginx pour l'API Email Analyzer (uvicorn sur 127.0.0.1:8000).
#
# Contexte : /api/analyze est désormais asynchrone (renvoie un job_id en <1 s puis
# le client interroge /api/analyze/{job_id}), donc chaque requête HTTP est courte.
# Ces timeouts élargis couvrent les endpoints encore synchrones (/api/chat,
# /api/draft) et laissent une marge confortable.
#
# À inclure dans un bloc server { ... }. Adapter server_name / certificats.
#
# Note zrok : le tunnel zrok applique aussi son propre timeout HTTP. L'approche
# asynchrone le contourne car aucune requête ne reste ouverte longtemps ; ces
# réglages ne concernent donc que les appels synchrones restants.

location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts : le worker d'analyse peut prendre plusieurs minutes côté serveur,
    # mais l'endpoint /api/analyze répond immédiatement. On garde une marge pour
    # /api/chat et /api/draft (encore synchrones).
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_buffering off;
}

# uvicorn : le store de jobs vit désormais dans Redis (email_analyzer/jobs.py),
# plus de contrainte "un seul worker" — plusieurs workers uvicorn peuvent tourner :
#   uvicorn api.main:app --host 127.0.0.1 --port 8000 --workers 2 --timeout-keep-alive 65
#
# En plus d'uvicorn, un (ou plusieurs) process worker arq DOIT tourner pour que
# les jobs mis en file par /api/analyze soient réellement exécutés :
#   cd services/email_analyzer && arq email_analyzer.analysis_tasks.WorkerSettings
# Nécessite REDIS_URL (voir .env) pointant vers le même Redis que l'API.
#
# Ce même process exécute aussi la sync planifiée 2x/jour (7h/19h, cf.
# WorkerSettings.cron_jobs, run_scheduled_sync) — aucune commande séparée à
# lancer. arq garantit une seule exécution par horaire même avec plusieurs
# process worker (cron_jobs "unique" par défaut, déduplication via Redis).
